<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude 助手工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css"
  />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-card">
        <div class="brand-mark">C</div>
        <div>
          <h1>Claude 助手工作台</h1>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>会话信息</h2>
          <button id="new-chat-btn" class="ghost-button" type="button">新建会话</button>
        </div>
        <div class="meta-grid">
          <div class="meta-item">
            <span class="meta-label">Session</span>
            <span id="session-id" class="meta-value muted">未创建</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">模型</span>
            <span id="model-name" class="meta-value muted">-</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">权限模式</span>
            <span id="permission-mode" class="meta-value muted">-</span>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2>附加目录</h2>
          <button id="edit-config-btn" class="ghost-button" type="button">编辑 JSON</button>
        </div>
        <div class="dir-config">
          <div class="dir-config-summary">
            <span class="composer-label">本地 JSON 配置</span>
            <span class="panel-note">保存在浏览器 storage 中，新建会话时生效</span>
          </div>
          <div id="add-dirs-list" class="dir-list">
            <span class="chip muted">未配置附加目录</span>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>可用 Skills / Commands</h2>
        <div id="skills-list" class="chip-list">
          <span class="chip muted">等待初始化</span>
        </div>
      </div>

      <div class="panel">
        <h2>提示建议</h2>
        <div class="prompt-list">
          <button class="prompt-chip" data-prompt="请先阅读当前项目结构，然后使用合适的 skill 帮我制定一个实现方案。">制定方案</button>
          <button class="prompt-chip" data-prompt="请检查项目中的潜在问题，并用适合的 skill 执行排查。">执行排查</button>
          <button class="prompt-chip" data-prompt="请帮我完成当前任务，优先使用可用 skill，并实时汇报进度。">完成任务</button>
        </div>
      </div>
    </aside>

    <main class="chat-layout">
      <header class="chat-header">
        <div>
          <p class="eyebrow">AI 个人助手</p>
        </div>
      </header>

      <section id="chat-log" class="chat-log">
        <div class="empty-state">
          <h3>开始一个新对话</h3>
          <p>消息会以流式方式实时出现，工具调用和任务进度也会显示在消息下方。</p>
        </div>
      </section>

      <form id="composer" class="composer">
        <label class="composer-label" for="message-input">输入你的任务</label>
        <textarea
          id="message-input"
          rows="4"
          placeholder="例如：请分析这个项目，并使用可用 skill 帮我执行修复。"
        ></textarea>
        <div class="composer-actions">
          <span class="composer-hint">Shift + Enter 换行，Enter 发送；生成中可点击按钮停止</span>
          <button id="send-btn" class="primary-button" type="submit">发送</button>
        </div>
      </form>
    </main>
  </div>

  <div id="config-modal" class="modal-backdrop hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="config-modal-title">
      <div class="panel-header modal-header">
        <div>
          <h2 id="config-modal-title">附加目录配置</h2>
          <p class="modal-description">使用 JSON 配置浏览器本地保存的 `add_dirs`，点击“新建会话”后生效。</p>
        </div>
        <button id="close-config-btn" class="ghost-button" type="button">关闭</button>
      </div>
      <label class="composer-label" for="config-json-input">配置 JSON</label>
      <textarea
        id="config-json-input"
        class="config-json-input"
        spellcheck="false"
      >{
  "version": 1,
  "add_dirs": []
}</textarea>
      <div id="config-error" class="config-error hidden"></div>
      <div class="modal-actions">
        <button id="reset-config-btn" class="ghost-button" type="button">重置默认</button>
        <button id="save-config-btn" class="primary-button" type="button">保存配置</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js" defer></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"
    defer
  ></script>
  <script src="/static/app.js" defer></script>
</body>
</html>
